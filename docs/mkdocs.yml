  - 第三章：Query/Agent 执行内核: 03-query-engine/README.md
  - 第四章：工具系统设计与实现: 04-tools/README.md
  - 第五章：记忆系统架构: 05-memory/README.md
  - 第六章：MCP 协议实现: 06-mcp/README.md
  - 第七章：Skills 机制: 07-skills/README.md
  - 第八章：Sandbox 安全机制: 08-sandbox/README.md
  - 第九章：UI 组件架构: 09-ui-components/README.md
  - 第十章：多Agent系统: 10-multi-agent/README.md
  - 附录:
    - A: Context 上下文管理: appendix-a-context-management/README.md
    - B: Session Storage 持久化: appendix-b-session-storage/README.md
    - C: 隐私保护与数据处理: appendix-c-privacy/README.md
